<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Calculadora</title>
</head>

<body class="min-h-screen bg-[#f5f5f7] flex items-center justify-center p-4 antialiased" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;">
  <form action="#" class="w-full max-w-md bg-white rounded-3xl shadow-[0_2px_20px_-4px_rgba(0,0,0,0.08),0_0_0_1px_rgba(0,0,0,0.02)] p-8 space-y-6">
    <div class="space-y-1">
      <h1 class="text-2xl font-semibold tracking-tight text-[#1d1d1f]">Calculadora</h1>
      <p class="text-sm text-[#86868b]">Ingresa dos números y selecciona una operación</p>
    </div>

    <div class="space-y-4">
      <div class="space-y-1.5">
        <label for="numero_1" class="block text-sm font-medium text-[#6e6e73] tracking-tight">Número 1</label>
        <input type="number" id="numero_1" name="numero_1"
          class="w-full h-11 px-4 rounded-xl border-0 bg-[#f5f5f7] text-[#1d1d1f] text-base font-normal
                 placeholder-[#86868b] outline-none
                 transition-all duration-200 ease-in-out
                 focus:bg-white focus:ring-2 focus:ring-[#0071e3] focus:shadow-[0_0_0_3px_rgba(0,113,227,0.15)]" />
      </div>

      <div class="space-y-1.5">
        <label for="numero_2" class="block text-sm font-medium text-[#6e6e73] tracking-tight">Número 2</label>
        <input type="number" id="numero_2" name="numero_2"
          class="w-full h-11 px-4 rounded-xl border-0 bg-[#f5f5f7] text-[#1d1d1f] text-base font-normal
                 placeholder-[#86868b] outline-none
                 transition-all duration-200 ease-in-out
                 focus:bg-white focus:ring-2 focus:ring-[#0071e3] focus:shadow-[0_0_0_3px_rgba(0,113,227,0.15)]" />
      </div>
    </div>

    <div class="bg-[#f5f5f7] rounded-2xl px-5 py-4 text-center min-h-[3.5rem] flex items-center justify-center">
      <p id="resultado" class="text-[#1d1d1f] text-lg font-semibold tracking-tight"></p>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button type="button" id="btnSuma"
        class="h-11 rounded-xl bg-[#0071e3] text-white text-sm font-semibold
               transition-all duration-200 ease-in-out
               hover:bg-[#0077ed] active:bg-[#006edb]
               active:scale-[0.97] cursor-pointer select-none">
        Sumar
      </button>
      <button type="button" id="btnResta"
        class="h-11 rounded-xl bg-[#0071e3] text-white text-sm font-semibold
               transition-all duration-200 ease-in-out
               hover:bg-[#0077ed] active:bg-[#006edb]
               active:scale-[0.97] cursor-pointer select-none">
        Restar
      </button>
      <button type="button" id="btnMultiplica"
        class="h-11 rounded-xl bg-[#e8e8ed] text-[#1d1d1f] text-sm font-semibold
               transition-all duration-200 ease-in-out
               hover:bg-[#dcdce1] active:bg-[#d1d1d6]
               active:scale-[0.97] cursor-pointer select-none">
        Multiplicar
      </button>
      <button type="button" id="btnDivide"
        class="h-11 rounded-xl bg-[#e8e8ed] text-[#1d1d1f] text-sm font-semibold
               transition-all duration-200 ease-in-out
               hover:bg-[#dcdce1] active:bg-[#d1d1d6]
               active:scale-[0.97] cursor-pointer select-none">
        Dividir
      </button>
    </div>
  </form>
  <script src="operaciones.js"></script>
  <script src="funciones.js"></script>
</body>

</html>
